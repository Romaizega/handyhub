services:
  db:
    image: postgres:16-alpine
    mem_limit: 128m
    restart: unless-stopped
    environment:
      POSTGRES_USER: handyhub
      POSTGRES_PASSWORD: handyhub
      POSTGRES_DB: handyhub
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U handyhub -d handyhub"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    mem_limit: 384m
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    expose:
      - "5000"
    volumes:
      - ./uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    mem_limit: 128m
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro

volumes:
  pg_data: