server {
    listen 80;
    server_name handyhub.izegov.dev;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name handyhub.izegov.dev;
    
    ssl_certificate /etc/letsencrypt/live/handyhub.izegov.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/handyhub.izegov.dev/privkey.pem;
    
    root /usr/share/nginx/html;
    index index.html;

    location /uploads/ {
        proxy_pass http://api:5000/uploads/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /api/ {
        proxy_pass http://api:5000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}